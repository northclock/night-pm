<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Night PM</title>
    <script>
      try {
        if (localStorage.getItem('night-pm-theme') === 'light') {
          document.documentElement.classList.remove('dark');
        }
      } catch {}
    </script>
  </head>
  <body class="m-0 p-0 overflow-hidden">
    <div id="splash" style="
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      background: #0f172a;
      transition: opacity 0.4s ease-out;
    ">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="animation: splash-pulse 2s ease-in-out infinite;">
        <circle cx="24" cy="24" r="20" stroke="#1e3a5f" stroke-width="2" fill="none" />
        <circle cx="24" cy="24" r="20" stroke="#3b82f6" stroke-width="2" fill="none"
          stroke-dasharray="126" stroke-dashoffset="90" stroke-linecap="round"
          style="animation: splash-spin 1.2s linear infinite;" />
        <circle cx="18" cy="16" r="1.2" fill="#60a5fa" opacity="0.7" />
        <circle cx="30" cy="12" r="0.8" fill="#60a5fa" opacity="0.5" />
        <circle cx="33" cy="22" r="1" fill="#60a5fa" opacity="0.6" />
        <circle cx="14" cy="28" r="0.9" fill="#60a5fa" opacity="0.4" />
        <path d="M20 28 C20 20, 28 20, 28 28 C28 34, 20 34, 20 28Z" fill="#3b82f6" opacity="0.15" />
        <path d="M22 26 L22 32 M26 26 L26 32 M24 24 L24 30" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
      </svg>
      <div style="text-align: center;">
        <div style="font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; font-weight: 600; color: #e2e8f0; letter-spacing: 0.5px;">
          Night PM
        </div>
        <div style="font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 11px; color: #64748b; margin-top: 6px;">
          Loading...
        </div>
      </div>
      <style>
        @keyframes splash-spin {
          to { stroke-dashoffset: -36; }
        }
        @keyframes splash-pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.8; transform: scale(0.96); }
        }
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
